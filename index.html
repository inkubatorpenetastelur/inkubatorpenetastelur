<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard - Sispeng Polban</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--light); 
            margin: 0; 
            padding: 20px;
            color: var(--primary);
        }

        .container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--light);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { margin: 0; color: var(--primary); }
        .subtitle { color: #7f8c8d; margin-top: 5px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--light);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; font-size: 0.9em; text-transform: uppercase; color: #7f8c8d; }
        .value { font-size: 1.8em; font-weight: bold; margin: 10px 0; }

        .status-pill {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            color: white;
        }

        .bg-on { background-color: var(--success); }
        .bg-off { background-color: var(--danger); }

        footer {
            text-align: center;
            font-size: 0.8em;
            color: #bdc3c7;
            margin-top: 30px;
        }

        .team { font-weight: bold; color: var(--secondary); }
    </style>
</head>
<body>

    <div class="container">
