<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-INKUBATOR 2026 | DASHBOARD</title>
    <!-- Library Grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff0055;
            --bg-dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            text-transform: uppercase;
        }

        .header {
            text-align: center;
            border: 2px solid var(--neon-pink);
            padding: 15px;
            background: rgba(255, 0, 85, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            letter-spacing: 5px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-left: 4px solid var(--neon-cyan);
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
            transform: translateY(-5px);
        }

        .card h3 {
            color: var(--neon-pink);
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .value {
            font-size: 3em;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .unit { font-size: 0.4em; color: #fff; }

        .btn {
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--neon-pink);
            color: black;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        input {
            background: #111;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px;
            width: 80px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.8em;
        }

        th, td {
            border: 1px solid #222;
            padding: 10px;
            text-align: left;
        }

        th { color: var(--neon-pink); }

        .status-active { color: var(--neon-cyan); animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>> SYSTEM_CONNECTED: CORE_INKUBATOR</h1>
    </div>

    <div class="container">
        <!-- Monitoring Card -->
        <div class="card">
            <h3>[ SENSOR_DATA ]</h3>
            <div class="value" id="temp">0<span class="unit">°C</span></div>
            <div class="value" id="humi">0<span class="unit">%</span></div>
            <div style="margin-top:10px">BRIGHTNESS: <span id="ldr">0</span></div>
        </div>

        <!-- Control Card -->
        <div class="card">
            <h3>[ COMMAND_CENTER ]</h3>
            <p>FAN_UNIT: <span id="fan_stat">OFFLINE</span></p>
            <button class="btn" onclick="toggleFan()">TOGGLE FAN</button>
            
            <div style="margin-top:20px">
                INTERVAL (ms): <br>
                <input type="number" id="intervalInput" value="3000">
                <button class="btn" style="width: auto;" onclick="updateInterval()">SET</button>
            </div>
        </div>

        <!-- Realtime Graphic -->
        <div class="card">
            <h3>[ TEMP_GRAPH_ANALYSIS ]</h3>
            <canvas id="liveChart"></canvas>
        </div>

        <!-- Log Table -->
        <div class="card">
            <h3>[ SYSTEM_LOGS ]</h3>
            <table id="logTable">
                <thead>
                    <tr>
                        <th>TIMESTAMP</th>
                        <th>EVENT_ID</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Log data will appear here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Setup Chart.js
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temperature',
                    borderColor: '#00f2ff',
                    backgroundColor: 'rgba(0, 242, 255, 0.1)',
                    data: [],
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { grid: { color: '#222' } } }
            }
        });

        // Fetch Data from ESP32
        function updateDashboard() {
            fetch('/data')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('temp').childNodes[0].nodeValue = data.suhu.toFixed(1);
                    document.getElementById('humi').childNodes[0].nodeValue = data.lembab.toFixed(1);
                    document.getElementById('ldr').innerText = data.cahaya;
                    
                    const fan = document.getElementById('fan_stat');
                    fan.innerText = data.kipas ? "ACTIVE" : "OFFLINE";
                    fan.className = data.kipas ? "status-active" : "";

                    // Chart Update
                    if(liveChart.data.labels.length > 15) {
                        liveChart.data.labels.shift();
                        liveChart.data.datasets[0].data.shift();
                    }
                    liveChart.data.labels.push("");
                    liveChart.data.datasets[0].data.push(data.suhu);
                    liveChart.update();

                    // Log Update
                    if(data.motor_log !== "IDLE") {
                        pushLog(data.motor_log);
                    }
                })
                .catch(err => console.log("System Offline..."));
        }

        function pushLog(msg) {
            const table = document.getElementById('logTable').getElementsByTagName('tbody')[0];
            const row = table.insertRow(0);
            row.insertCell(0).innerText = new Date().toLocaleTimeString();
            row.insertCell(1).innerText = msg;
            if(table.rows.length > 5) table.deleteRow(5);
        }

        function toggleFan() { fetch('/toggleFan'); }
        function updateInterval() {
            const val = document.getElementById('intervalInput').value;
            fetch('/set?interval=' + val);
        }

        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
